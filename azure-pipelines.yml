# Azure DevOps Pipeline: Mirror repo to GitHub
# ------------------------------------------------
# Prerequisites:
#   1. Create a GitHub Personal Access Token (PAT) with "repo" scope.
#   2. In Azure DevOps, go to Pipelines > Library > Variable Groups (or
#      pipeline variables) and add a secret variable named GITHUB_PAT
#      containing the token.
#   3. Update the GITHUB_REPO variable below with your GitHub repo URL
#      (without the https:// prefix).
#
# This pipeline pushes all branches and tags to GitHub on every commit
# to your default branch (and can be extended to other triggers).

trigger:
  branches:
    include:
      - main          # adjust to your default branch (master, develop, etc.)

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Set this to your GitHub repo path: github.com/<owner>/<repo>.git
  GITHUB_REPO: 'github.com/ke4pjw/P2QR.git'

steps:
  # Azure DevOps does a shallow fetch by default — override that so the
  # full history (all branches, all tags) is available to push.
  - checkout: self
    fetchDepth: 0
    persistCredentials: true

  - script: |


      # ---- add GitHub as a remote using the PAT for authentication ----
      git remote add github "https://$(GITHUB_PAT)@$(GITHUB_REPO)"

      # ---- fetch all remote branches so they are available locally ----
      git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      # ---- push all branches and tags to GitHub ----
      git push github 'refs/remotes/origin/*:refs/heads/*' --force
      git push github --tags  --force

      echo "✅ Successfully mirrored to GitHub."
    displayName: 'Push to GitHub'
    env:
      GITHUB_PAT: $(GITHUB_PAT)   # maps the secret variable into the env